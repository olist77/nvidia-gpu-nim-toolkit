name: TMAS Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Comprehensive security scanning with pip install and package scanning
  tmas-security-scan:
    name: TMAS Security Scan
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: nvidia-gpu-nim-toolkit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd nvidia-gpu-nim-toolkit
          # Install dependencies, continue on failure to ensure TMAS can scan available packages
          pip install -r requirements.txt --target ../pip-packages || echo "Some packages failed to install - continuing with available packages"
          pip install -e . --target ../pip-packages || echo "Local package install failed - continuing with available packages"
          # List installed packages for debugging
          echo "=== Installed packages for TMAS scanning ==="
          find ../pip-packages -name "*.dist-info" -exec basename {} \; | sort
          echo "=== Total package count ==="
          find ../pip-packages -name "*.dist-info" | wc -l

      - name: TMAS Scan Installed Dependencies
        uses: trendmicro/tmas-scan-action@main
        with:
          version: '2'
          vulnerabilitiesScan: true
          malwareScan: false
          secretsScan: false
          artifact: dir:./pip-packages
          additionalArgs: --region=us-east-1 -vvv 
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: TMAS Scan Source Code
        uses: trendmicro/tmas-scan-action@main
        with:
          version: '2'
          vulnerabilitiesScan: true
          malwareScan: false
          secretsScan: true
          artifact: dir:./nvidia-gpu-nim-toolkit
          additionalArgs: --region=ap-southeast-2 -vvv 
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}


